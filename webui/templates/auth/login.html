<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - {{ app_name }}</title>

    <!-- 引入现代字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            /* 使用与主应用一致的色彩系统 */
            --primary-color: #0f172a;
            --secondary-color: #334155;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: #dbeafe;

            --success-color: #10b981;
            --success-bg: #d1fae5;
            --danger-color: #ef4444;
            --danger-bg: #fee2e2;

            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-light: #94a3b8;

            --border-color: #f1f5f9;
            --border-color-strong: #e2e8f0;
            --shadow-card: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);

            --border-radius-md: 0.75rem;
            --border-radius-xl: 1.5rem;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: var(--transition);
            padding: 2rem;
        }

        .login-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border-color-strong);
        }

        /* 品牌标题 - 类似主应用的 page-title */
        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: -0.025em;
        }

        .page-title i {
            color: var(--accent-color);
            font-size: 1.25rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
            margin-top: -1rem;
        }

        .form-floating {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-control {
            border-radius: var(--border-radius-md);
            border: 1px solid var(--border-color-strong);
            padding: 0.875rem;
            font-size: 0.875rem;
            color: var(--text-main);
            background-color: var(--bg-color);
            transition: var(--transition);
            height: auto;
        }

        .form-control:focus {
            border-color: var(--accent-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
            outline: none;
        }

        .form-floating label {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.875rem;
        }

        .password-toggle {
            position: absolute;
            right: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            z-index: 10;
            padding: 0.25rem;
            border-radius: 0.25rem;
            transition: var(--transition);
        }

        .password-toggle:hover {
            color: var(--text-main);
            background-color: var(--border-color);
        }

        .btn-login {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            border-radius: var(--border-radius-md);
            font-weight: 500;
            padding: 0.75rem 1rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            width: 100%;
            margin-bottom: 1.5rem;
        }

        .btn-login:hover:not(:disabled) {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            transform: translateY(-1px);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            border-radius: var(--border-radius-md);
            border: none;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .alert-danger {
            background-color: var(--danger-bg);
            color: #dc2626;
        }

        .alert-success {
            background-color: var(--success-bg);
            color: #059669;
        }

        .loading-spinner {
            display: none;
        }

        .btn-login.loading .loading-spinner {
            display: inline-block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        .login-footer {
            text-align: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .login-footer small {
            color: var(--text-light);
            font-size: 0.75rem;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }

            .login-card {
                padding: 1.5rem;
            }

            .page-title {
                font-size: 1.25rem;
            }
        }

        /* 动画效果 */
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container fade-in">
        <div class="login-card">
            <!-- 品牌标题 - 类似主应用的页面标题风格 -->
            <h1 class="page-title">
                <i class="fas fa-cube"></i>{{ app_name }}
            </h1>
            <p class="login-subtitle">请输入密码以访问管理界面</p>

            {% if error %}
            <div class="alert alert-danger" role="alert">
                <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
            </div>
            {% endif %}

            <form id="loginForm" method="post">
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="请输入密码" required autocomplete="current-password">
                    <label for="password"><i class="fas fa-lock me-2"></i>密码</label>
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>

                <button type="submit" class="btn btn-primary btn-login">
                    <span class="loading-spinner spinner-border spinner-border-sm" role="status"></span>
                    <span class="btn-text">
                        <i class="fas fa-sign-in-alt me-2"></i>登录
                    </span>
                </button>
            </form>

            <div class="login-footer">
                <small>
                    <i class="fas fa-shield-alt me-1"></i>
                    安全提示：请妥善保管您的密码
                </small>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 密码显示/隐藏切换
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                toggleIcon.className = 'fas fa-eye';
            }
        }

        // 表单提交处理
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const form = this;
            const submitBtn = form.querySelector('button[type="submit"]');
            const password = form.password.value.trim();

            if (!password) {
                showAlert('请输入密码', 'danger');
                return;
            }

            // 显示加载状态
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ password: password })
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = result.redirect || '/';
                    }, 1000);
                } else {
                    showAlert(result.error || '登录失败', 'danger');
                }
            } catch (error) {
                console.error('登录请求失败:', error);
                showAlert('网络错误，请重试', 'danger');
            } finally {
                // 恢复按钮状态
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        // 显示提示信息
        function showAlert(message, type) {
            // 验证类型参数，防止CSS注入
            const validTypes = ['success', 'danger', 'warning', 'info'];
            const safeType = validTypes.includes(type) ? type : 'info';

            // 移除现有的提示
            const existingAlert = document.querySelector('.alert');
            if (existingAlert) {
                existingAlert.remove();
            }

            // 创建新的提示
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${safeType}`;

            // 安全地创建图标和消息
            const icon = document.createElement('i');
            const iconClass = safeType === 'success' ? 'check-circle' : 'exclamation-triangle';
            icon.className = `fas fa-${iconClass} me-2`;

            const messageSpan = document.createElement('span');
            messageSpan.textContent = message; // 使用 textContent 防止 XSS

            alertDiv.appendChild(icon);
            alertDiv.appendChild(messageSpan);

            // 插入到表单前面
            const form = document.getElementById('loginForm');
            form.parentNode.insertBefore(alertDiv, form);

            // 自动消失
            if (type === 'success') {
                setTimeout(() => {
                    alertDiv.remove();
                }, 3000);
            }
        }

        // 页面加载完成后聚焦密码输入框
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('password').focus();
        });

        // 回车键提交
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
