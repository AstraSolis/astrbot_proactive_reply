<!doctype html>
<html lang="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-user">
          <div class="avatar" id="sidebar-avatar" aria-hidden="true"></div>
          <div class="user-meta">
            <div class="user-name" id="sidebar-plugin-name"></div>
            <div class="user-role" id="sidebar-plugin-role"></div>
          </div>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav" aria-label="">
          <div class="nav-section-label" id="nav-section-main"></div>
          <button type="button" class="nav-item active" data-view="dashboard" id="nav-dashboard">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </span>
            <span class="nav-label" id="nav-label-dashboard"></span>
          </button>
          <button type="button" class="nav-item" data-view="sessions" id="nav-sessions">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </span>
            <span class="nav-label" id="nav-label-sessions"></span>
          </button>
          <button type="button" class="nav-item" data-view="schedules" id="nav-schedules">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </span>
            <span class="nav-label" id="nav-label-schedules"></span>
          </button>
          <button type="button" class="nav-item" data-view="calendar" id="nav-calendar">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </span>
            <span class="nav-label" id="nav-label-calendar"></span>
          </button>
          <button type="button" class="nav-item" data-view="placeholders" id="nav-placeholders">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            </span>
            <span class="nav-label" id="nav-label-placeholders"></span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <span id="sidebar-version"></span>
        </div>
      </aside>

      <div class="app-main">
        <header class="topbar">
          <button type="button" class="menu-toggle" id="menu-toggle" aria-label="">
            <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>

          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="search-input" autocomplete="off" />
            <kbd class="search-kbd" id="search-kbd" hidden></kbd>
          </div>

          <div class="topbar-tools">
            <button type="button" class="tool-btn" id="btn-refresh" title="">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            </button>
            <button type="button" class="tool-btn tool-btn-primary" id="btn-add-session" style="display:none;">
              <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </header>

        <main class="content">
          <div id="global-error" class="alert alert-error" style="display:none;" role="alert"></div>

          <div class="view view-active" id="view-dashboard" data-view="dashboard">
            <header class="page-header">
              <h1 class="page-title" id="page-title-dashboard"></h1>
            </header>

            <section class="content-section">
              <h2 class="section-title" id="section-today"></h2>
              <div class="metrics-grid" id="dash-stats-grid">
                <div class="loading"><div class="spinner"></div><span class="loading-text"></span></div>
              </div>
            </section>

            <section class="content-section">
              <h2 class="section-title" id="section-recent"></h2>
              <div class="panel-grid">
                <article class="panel">
                  <header class="panel-head">
                    <h3 class="panel-title" id="hdr-plugin-status"></h3>
                    <button type="button" class="panel-action" id="btn-refresh-panel" title="">
                      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    </button>
                  </header>
                  <div class="panel-body" id="plugin-status-rows">
                    <div class="loading"><div class="spinner"></div><span class="loading-text"></span></div>
                  </div>
                </article>

                <article class="panel">
                  <header class="panel-head">
                    <h3 class="panel-title" id="hdr-recent-activity"></h3>
                  </header>
                  <div class="panel-body panel-body-flush" id="timeline">
                    <div class="loading"><div class="spinner"></div><span class="loading-text"></span></div>
                  </div>
                </article>
              </div>
            </section>
          </div>

          <div class="view" id="view-schedules" data-view="schedules">
            <header class="page-header">
              <h1 class="page-title" id="page-title-schedules"></h1>
            </header>
            <article class="panel panel-table">
              <header class="panel-head">
                <h3 class="panel-title" id="hdr-schedule-list"></h3>
              </header>
              <div class="panel-body panel-body-flush" id="schedules-container">
                <div class="loading"><div class="spinner"></div><span class="loading-text"></span></div>
              </div>
            </article>
          </div>

          <div class="view" id="view-placeholders" data-view="placeholders">
            <header class="page-header">
              <h1 class="page-title" id="page-title-placeholders"></h1>
              <p class="page-subtitle" id="placeholders-subtitle"></p>
            </header>
            <div id="placeholders-container"></div>
          </div>

          <div class="view" id="view-calendar" data-view="calendar">
            <header class="page-header">
              <h1 class="page-title" id="page-title-calendar"></h1>
              <p class="page-subtitle" id="calendar-subtitle"></p>
            </header>

            <section class="content-section">
              <div class="calendar-toggle-row">
                <label class="switch">
                  <input type="checkbox" id="calendar-enable-toggle" />
                  <span class="switch-track" aria-hidden="true"></span>
                </label>
                <div class="calendar-toggle-text">
                  <span class="calendar-toggle-label" id="calendar-enable-label"></span>
                  <span class="calendar-toggle-hint" id="calendar-enable-hint"></span>
                </div>
              </div>
            </section>

            <div id="calendar-disabled-state" style="display:none;"></div>

            <section class="content-section" id="calendar-body" style="display:none;">
              <article class="panel" style="margin-bottom:16px;">
                <header class="panel-head">
                  <h3 class="panel-title" id="calendar-display-title"></h3>
                </header>
                <div class="panel-body">
                  <div class="cal-settings-row">
                    <div class="cal-form-field">
                      <label id="cal-sep-label" for="cal-sep-input"></label>
                      <input type="text" id="cal-sep-input" maxlength="20" />
                      <span class="cal-field-hint" id="cal-sep-hint"></span>
                    </div>
                    <div class="cal-form-field">
                      <label id="cal-empty-label" for="cal-empty-input"></label>
                      <input type="text" id="cal-empty-input" maxlength="200" />
                      <span class="cal-field-hint" id="cal-empty-hint"></span>
                    </div>
                    <button type="button" class="btn btn-ghost btn-sm" id="cal-settings-save"></button>
                  </div>
                </div>
              </article>

              <article class="panel" style="margin-bottom:16px;">
                <header class="panel-head">
                  <h3 class="panel-title" id="cal-ai-title"></h3>
                </header>
                <div class="panel-body">
                  <p class="cal-ai-subtitle" id="cal-ai-subtitle"></p>
                  <div class="cal-ai-form">
                    <div class="cal-form-field cal-ai-provider-field">
                      <label id="cal-ai-provider-label" for="cal-ai-provider"></label>
                      <select id="cal-ai-provider"></select>
                      <span class="cal-field-hint" id="cal-ai-provider-hint"></span>
                    </div>
                    <div class="cal-form-field">
                      <label id="cal-ai-prompt-label" for="cal-ai-prompt-input"></label>
                      <textarea id="cal-ai-prompt-input" rows="2" maxlength="200"></textarea>
                      <span class="cal-field-hint" id="cal-ai-prompt-hint"></span>
                    </div>
                    <div class="cal-ai-actions">
                      <button type="button" class="btn btn-primary btn-sm" id="cal-ai-generate"></button>
                    </div>
                  </div>
                  <div class="cal-ai-result" id="cal-ai-result" style="display:none;">
                    <div class="cal-ai-result-head">
                      <span class="cal-ai-result-title" id="cal-ai-result-title"></span>
                      <div class="cal-ai-result-actions">
                        <button type="button" class="btn btn-ghost btn-sm" id="cal-ai-apply-merge"></button>
                        <button type="button" class="btn btn-primary btn-sm" id="cal-ai-apply-replace"></button>
                      </div>
                    </div>
                    <div class="cal-ai-preview" id="cal-ai-preview"></div>
                  </div>
                </div>
              </article>

              <article class="panel">
                <header class="panel-head calendar-head">
                  <div class="calendar-nav">
                    <button type="button" class="tool-btn" id="cal-prev" title="">
                      <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <h3 class="panel-title calendar-month-title" id="calendar-month-title"></h3>
                    <button type="button" class="tool-btn" id="cal-next" title="">
                      <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                    <button type="button" class="btn btn-ghost btn-sm" id="cal-today"></button>
                  </div>
                  <div class="calendar-tools">
                    <button type="button" class="btn btn-ghost btn-sm" id="cal-import"></button>
                    <button type="button" class="btn btn-ghost btn-sm" id="cal-export"></button>
                    <button type="button" class="btn btn-ghost btn-sm" id="cal-clear-month"></button>
                    <button type="button" class="btn btn-ghost btn-sm" id="cal-clear-year"></button>
                    <button type="button" class="btn btn-danger btn-sm" id="cal-clear-all"></button>
                    <input type="file" id="cal-import-file" accept=".yaml,.yml,application/x-yaml,text/yaml" hidden />
                  </div>
                </header>
                <div class="panel-body">
                  <div class="calendar-weekdays" id="calendar-weekdays"></div>
                  <div class="calendar-grid" id="calendar-grid"></div>
                </div>
              </article>
            </section>
          </div>

          <div class="view" id="view-sessions" data-view="sessions">
            <header class="page-header">
              <h1 class="page-title" id="page-title-sessions"></h1>
            </header>

            <section class="content-section">
              <div class="metrics-grid metrics-grid-3" id="sess-stats-grid">
                <div class="metric-card">
                  <div class="metric-card-top">
                    <span class="metric-label" id="lbl-stat-total"></span>
                  </div>
                  <div class="metric-value" id="count-total">—</div>
                </div>
                <div class="metric-card">
                  <div class="metric-card-top">
                    <span class="metric-label" id="lbl-stat-active"></span>
                  </div>
                  <div class="metric-value metric-value--success" id="count-active">—</div>
                </div>
                <div class="metric-card">
                  <div class="metric-card-top">
                    <span class="metric-label" id="lbl-stat-inactive"></span>
                  </div>
                  <div class="metric-value" id="count-inactive">—</div>
                </div>
              </div>
            </section>

            <article class="panel panel-table">
              <header class="panel-head">
                <h3 class="panel-title" id="hdr-session-list"></h3>
              </header>
              <div class="panel-body panel-body-flush" id="sessions-container">
                <div class="loading"><div class="spinner"></div><span class="loading-text"></span></div>
              </div>
            </article>
          </div>
        </main>
      </div>
    </div>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <div class="dialog-overlay" id="add-dialog" style="display:none;" role="dialog" aria-modal="true">
      <div class="dialog">
        <header class="dialog-header" id="dialog-add-title"></header>
        <div class="dialog-body">
          <label for="input-session-id" id="label-session-id"></label>
          <input type="text" id="input-session-id" />
          <div class="form-hint" id="session-id-hint"></div>
        </div>
        <footer class="dialog-footer">
          <button type="button" class="btn btn-ghost" id="btn-dialog-cancel"></button>
          <button type="button" class="btn btn-primary" id="submit-btn"></button>
        </footer>
      </div>
    </div>

    <div class="dialog-overlay" id="session-detail-dialog" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="detail-title">
      <div class="dialog dialog-lg">
        <header class="dialog-header" id="detail-title"></header>
        <div class="dialog-body dialog-body-scroll" id="detail-body"></div>
        <footer class="dialog-footer">
          <button type="button" class="btn btn-ghost" id="btn-detail-close"></button>
        </footer>
      </div>
    </div>

    <div class="dialog-overlay" id="confirm-dialog" style="display:none;" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message">
      <div class="dialog">
        <header class="dialog-header" id="confirm-title"></header>
        <div class="dialog-body" id="confirm-message"></div>
        <footer class="dialog-footer">
          <button type="button" class="btn btn-ghost" id="btn-confirm-cancel"></button>
          <button type="button" class="btn btn-danger" id="btn-confirm-ok"></button>
        </footer>
      </div>
    </div>

    <div class="dialog-overlay" id="calendar-day-dialog" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="cal-day-title">
      <div class="dialog dialog-lg">
        <header class="dialog-header" id="cal-day-title"></header>
        <div class="dialog-body dialog-body-scroll">
          <div id="cal-day-events"></div>
          <div class="cal-event-form">
            <label id="cal-form-text-label" for="cal-form-text"></label>
            <input type="text" id="cal-form-text" maxlength="200" />
            <div class="cal-form-row">
              <div class="cal-form-field">
                <label id="cal-form-year-label" for="cal-form-year"></label>
                <input type="number" id="cal-form-year" min="1970" max="9999" step="1" />
                <span class="cal-field-hint" id="cal-form-year-hint" style="display:none;"></span>
              </div>
              <div class="cal-form-field">
                <label id="cal-form-repeat-label" for="cal-form-repeat"></label>
                <select id="cal-form-repeat"></select>
              </div>
            </div>
          </div>
        </div>
        <footer class="dialog-footer">
          <button type="button" class="btn btn-ghost" id="cal-day-close"></button>
          <button type="button" class="btn btn-primary" id="cal-day-save"></button>
        </footer>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
